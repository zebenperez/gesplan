{% load i18n static gestion_tags %}

<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="description" content="">
        <title>Gesplan</title>

		{% block extrahead%} {% endblock extrahead%}

        <link rel="manifest" href="{% static 'manifest.json' %}">
        <!-- Bootstrap core CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

        <!-- Font awesome -->
        <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.7.2/css/all.css" integrity="sha384-fnmOCqbTlWIlj8LyTjo7mOUStjsKC4pOpQbqyi7RrhN7udi9RwhKkMHpvLbHG9Sr" crossorigin="anonymous">

        <!-- JQuery -->
        <script src="https://code.jquery.com/jquery-3.5.1.js" ></script>
        <!-- SweetAlert -->
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@10"></script>

        <!-- Calendar -->
        <link rel="stylesheet" href="{% static 'css/calendar.css' %}" >
        <script src="{% static "js/calendar.js" %}"></script>

        <!-- Shidix -->
        <link rel="stylesheet" href="{% static 'css/styles.css' %}" >
        <script src="{% static "js/common.js" %}"></script>
        <script src="{% static "js/jquery.countdown360.js" %}"></script>


        <!-- Favicons -->
        <meta name="theme-color" content="#7952b3">
    </head>
    <body>
        <div id="main-layout-container">
            {% if request.user.is_authenticated %}
	            <div id="main" class="w-100">
                    <div class="row header sticky-top bg-white m-0">
                        <div class="col-lg-1 col-1 text-center divbars-menu">
                            <a href="#" class="menu-btn"><i class="fas fa-bars"></i></a></div> 
                        <div class="col-lg-1 col-3 text-center"><a href="https://www.tenerife.es/" target="_blank"><img src="{% static '/images/logo-cabtfe-positivo.png'%}" width=""/></a></div>
                        <div class="col-lg-1 col-3 text-center">
                            <a href="https://gesplan.shidix.es"><img src="{% static '/images/app-logo.png'%}" ></a>
                        </div>	
        	            <div class="col-lg-3 offset-lg-5 col-5 text-right p-0"> 
					        {% trans "Hola" %}, {{request.user}}
				        </div>
        	            <div class="col-lg-1 col-1 text-right"> 
                	        <form action="{% url 'auth_logout' %}" method="post" id="frmLogout" class="m-0">
                        	    {% csrf_token %}
                                <a class="pointer" onclick="$('#frmLogout').submit();"><i class="fas fa-sign-out-alt"></i></a>
	                        </form> 
				        </div>
                    </div>
	            </div>
            {% endif %}

            <main id="main-content">
                <aside id="sidebar" class="bg-light closed_"> <div id="side_menu"> {% include "sidebar_items.html" %} </div> </aside>
                <section id="content-section" class="ml-3"> {% block central_content %}{% endblock central_content %} </section>
            </main>
        </div>

        <div class="overlay"></div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" 
            integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/feather-icons@4.28.0/dist/feather.min.js" 
            integrity="sha384-uO3SXW5IuS1ZpFPKugNNWqTZRRglnUJK6UAZ/gxOX80nxEkN9NcGZTftn6RzhGWE" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/chart.js@2.9.4/dist/Chart.min.js" 
            integrity="sha384-zNy6FEbO50N+Cg5wap8IKA4M/ZnLJgzc6w2NqACZaK0u0FXfOWRRJOnQtpZun8ha" crossorigin="anonymous"></script>
        <script src="{% static "js/layout.js" %}"></script>
    </body>
</html>
